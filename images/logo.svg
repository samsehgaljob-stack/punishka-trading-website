<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" fill="none">

  <!-- ══════════════════════════════════════
       DJ MONOGRAM MARK
  ══════════════════════════════════════ -->

  <!-- Outer D shape — solid black -->
  <path d="M0 4 L0 86 L26 86 Q72 86 72 45 Q72 4 26 4 Z" fill="#1a1a1a"/>
  <!-- Inner D cutout — white -->
  <path d="M13 18 L24 18 Q56 18 56 45 Q56 72 24 72 L13 72 Z" fill="#ffffff"/>

  <!-- J shape — red, italic feel via skew -->
  <g transform="skewX(-6)">
    <!-- J vertical bar -->
    <rect x="79" y="4" width="14" height="64" rx="2" fill="#CC1111"/>
    <!-- J hook curve at bottom -->
    <path d="M79 68 Q79 86 63 86 Q52 86 48 78 L58 72 Q60 78 63 78 Q67 78 67 68 Z" fill="#CC1111"/>
  </g>

  <!-- ══════════════════════════════════════
       VERTICAL DIVIDER
  ══════════════════════════════════════ -->
  <rect x="106" y="10" width="1.5" height="70" rx="0.75" fill="#d0d0d0"/>

  <!-- ══════════════════════════════════════
       TEXT BLOCK
  ══════════════════════════════════════ -->

  <!-- ELECTRONIC — small, tracking wide -->
  <text x="120" y="30"
    font-family="'Barlow Condensed','Arial Narrow','Arial',sans-serif"
    font-size="14.5"
    font-weight="700"
    fill="#1a1a1a"
    letter-spacing="3.5">ELECTRONIC</text>

  <!-- PUNISHKA — heavy headline -->
  <text x="118" y="68"
    font-family="'Barlow Condensed','Arial Black','Arial',sans-serif"
    font-size="40"
    font-weight="900"
    fill="#1a1a1a"
    letter-spacing="1">PUNISHKA</text>

  <!-- Red underline -->
  <rect x="118" y="73" width="280" height="3" rx="1.5" fill="#CC1111"/>

  <!-- TRADING — spaced small caps -->
  <text x="188" y="87"
    font-family="'Barlow Condensed','Arial Narrow','Arial',sans-serif"
    font-size="11"
    font-weight="500"
    fill="#444444"
    letter-spacing="7">TRADING</text>

</svg>
