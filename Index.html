<style>
/* ============================================================
   ROOT VARIABLES
============================================================ */
:root {
  --orange: #FF6B00;
  --orange-dark: #cc5500;
  --orange-light: #ff8c33;
  --orange-glow: rgba(255,107,0,0.13);
  --dark: #0f0f0f;
  --dark2: #181818;
  --text: #1a1a1a;
  --muted: #666;
  --muted2: #999;
  --bg: #f5f5f5;
  --white: #ffffff;
  --border: #e5e5e5;
  --green: #25D366;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  padding-top: 62px; /* header height */
  padding-bottom: 72px; /* sticky bottom bar */
}
h1,h2,h3,h4,h5 {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
}
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }

/* ============================================================
   PAGE SECTIONS (SPA navigation)
============================================================ */
.page-section { display: none; }
.page-section.active { display: block; }

/* ============================================================
   STICKY HEADER
============================================================ */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(16px);
  border-bottom: 2.5px solid var(--orange);
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--orange);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 20px; height: 20px; fill: white; }
.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.1;
  color: var(--dark);
}
.logo-name span { color: var(--orange); }

/* Desktop Nav */
.desktop-nav {
  display: none;
  align-items: center;
  gap: 4px;
}
.nav-link {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  border: none;
  background: none;
}
.nav-link:hover { color: var(--text); background: #f0f0f0; }
.nav-link.active { color: var(--orange); background: var(--orange-glow); }

.header-call-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--orange);
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 9px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  animation: pulse-btn 2.5s ease-in-out infinite;
  white-space: nowrap;
}
.header-call-btn svg { width: 17px; height: 17px; fill: white; }
@keyframes pulse-btn {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(255,107,0,0); }
}

/* ============================================================
   URGENCY TICKER
============================================================ */
.ticker {
  background: var(--dark);
  color: #fff;
  font-size: 11.5px;
  font-weight: 600;
  padding: 6px 0;
  overflow: hidden;
  white-space: nowrap;
}
.ticker-inner {
  display: inline-flex;
  animation: ticker-scroll 32s linear infinite;
}
.ticker-item { padding: 0 36px; display: flex; align-items: center; gap: 7px; }
.ticker-dot { color: var(--orange); }
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ============================================================
   COMMON HELPERS
============================================================ */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; color: var(--orange); margin-bottom: 8px;

.section-sub { font-size: 14px; color: var(--muted); margin-top: 8px; }

============================================================ */

  background: var(--green); color: white;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 18px; text-transform: uppercase; letter-spacing: 0.3px;
  padding: 13px 24px; border-radius: 11px; border: none; cursor: pointer;

}
.btn-whatsapp svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

.btn-outline-orange {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  background: white; color: var(--orange);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;

.btn-outline-orange svg { width: 16px; height: 16px; fill: var(--orange); }

/* ============================================================
