<style>
/* ====================================================
   VARIABLES & RESET
==================================================== */
:root{
  --or:#FACC15; --or2:#EAB308; --or3:rgba(250,204,21,0.18);
  --dk:#18181B; --dk2:#27272A;
  --tx:#27272A; --mu:#52525B; --mu2:#71717A;
  --bg:#FFFDF7; --wh:#fff; --bd:#FDE68A;
  --gn:#25D366; --rd:#dc2626;
  --sh:0 2px 12px rgba(0,0,0,0.08);
  --sh2:0 8px 32px rgba(0,0,0,0.13);
  --r:10px; --r2:14px; --r3:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;padding-top:62px;padding-bottom:68px}
h1,h2,h3,h4,h5{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.03em;line-height:1}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* ====================================================
   SPA PAGES
==================================================== */
.pg{display:none}.pg.on{display:block}

/* ====================================================
   HEADER
==================================================== */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(255,255,255,.98);backdrop-filter:blur(16px);
  border-bottom:2.5px solid var(--or);
  height:62px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
}
.hdr-logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.hdr-logo-icon{width:36px;height:36px;background:var(--or);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo-icon svg{width:20px;height:20px;fill:#fff}
.hdr-logo-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:.08em;line-height:1.15}
.hdr-logo-name span{color:var(--or)}
.hdr-nav{display:none;align-items:center;gap:2px}
.nav-btn{font-size:13.5px;font-weight:600;color:var(--mu);padding:7px 13px;border-radius:8px;border:none;background:none;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:var(--tx);background:#f0f0f0}
.nav-btn.on{color:var(--or);background:var(--or3)}
.hdr-call{
  display:flex;align-items:center;gap:7px;
  background:var(--or);color:var(--dk);
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;
  padding:9px 15px;border-radius:9px;border:none;
  animation:pulse-hdr 2.5s ease-in-out infinite;white-space:nowrap;
}
.hdr-call svg{width:16px;height:16px;fill:var(--dk)}
@keyframes pulse-hdr{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,.5)}50%{box-shadow:0 0 0 8px rgba(250,204,21,0)}}

/* ====================================================
   TICKER
==================================================== */
.ticker{background:var(--dk);color:#fff;font-size:11.5px;font-weight:600;padding:5px 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-flex;animation:tick 35s linear infinite}
.ti{padding:0 36px;display:flex;align-items:center;gap:7px}
.td{color:var(--or)}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ====================================================
   COMMON HELPERS
==================================================== */
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--or);margin-bottom:7px}
.ttl{font-size:clamp(28px,7.5vw,50px);font-weight:900;color:var(--dk)}
.sub{font-size:14px;color:var(--mu);margin-top:7px;line-height:1.65}
.wrap{padding:40px 15px}
.divider{height:1px;background:var(--bd)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;transition:all .15s}
.btn svg{flex-shrink:0}
.btn-or{background:var(--or);color:var(--dk);padding:13px 22px;border-radius:10px;font-size:18px;box-shadow:0 5px 20px rgba(250,204,21,.35)}
.btn-or:active,.btn-or:hover{background:var(--or2)}
.btn-or svg{width:20px;height:20px;fill:var(--dk)}
.btn-wa{background:var(--gn);color:#fff;padding:12px 22px;border-radius:10px;font-size:17px}
.btn-wa svg{width:19px;height:19px;fill:#fff}
.btn-out{background:var(--wh);color:var(--or);padding:11px 16px;border-radius:9px;border:2px solid var(--or);font-size:15px}
.btn-out svg{width:14px;height:14px;fill:var(--or)}
.btn-full{width:100%}

/* FORMS */
.flbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:5px}
.finp{width:100%;padding:12px 13px;border:1.5px solid var(--bd);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--tx);background:#fafafa;transition:border-color .18s;appearance:none;-webkit-appearance:none}
.finp:focus{outline:none;border-color:var(--or);background:var(--wh)}
.ftxt{min-height:80px;resize:vertical}
.fgrp{margin-bottom:14px}
.f-submit{width:100%;background:var(--or);color:var(--dk);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase;padding:15px;border-radius:11px;border:none;cursor:pointer;margin-top:4px;transition:background .15s}
.f-submit:active{background:var(--or2)}
.f-ok{display:none;background:#f0fdf4;border:2px solid #22c55e;border-radius:11px;padding:18px;text-align:center;margin-top:12px}
.f-ok.show{display:block}
.f-ok h4{font-size:20px;font-weight:900;color:#16a34a;margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.f-ok p{font-size:13px;color:#555}
.f-ok-wa{display:inline-flex;align-items:center;gap:6px;background:var(--gn);color:#fff;font-weight:700;padding:10px 18px;border-radius:8px;margin-top:11px;font-size:13px}
.f-ok-wa svg{width:16px;height:16px;fill:#fff}

/* TRUST BADGES */
.trust-row{background:var(--wh);border-bottom:1px solid var(--bd);display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:18px 15px}
.tr-item{display:flex;align-items:center;gap:9px}
.tr-ico{width:36px;height:36px;background:var(--or3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tr-ico svg{width:18px;height:18px;fill:var(--or)}
.tr-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13.5px;text-transform:uppercase;line-height:1.1}
.tr-s{font-size:10.5px;color:var(--mu);margin-top:2px}

/* STATS */
.stats{background:var(--or);display:grid;grid-template-columns:repeat(3,1fr);text-align:center}
.st{padding:18px 6px}
.st+.st{border-left:1px solid rgba(255,255,255,.22)}
.st-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--dk);line-height:1}
.st-l{font-size:9.5px;font-weight:700;color:rgba(24,24,27,.78);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* PRODUCT CARDS */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:14px 14px}
.pc{background:var(--wh);border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--bd);position:relative;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.pc:hover{box-shadow:0 8px 30px rgba(0,0,0,.12);transform:translateY(-2px)}
.pc-badge{position:absolute;top:8px;left:8px;z-index:2;background:var(--or);color:var(--dk);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;padding:3px 7px;border-radius:5px}
.pc-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eee}
.pc-body{padding:10px 10px 12px;flex:1;display:flex;flex-direction:column}
.pc-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--or);margin-bottom:3px}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;line-height:1.1;margin-bottom:7px;color:var(--dk)}
.pc-desc{font-size:11px;color:var(--mu);line-height:1.5;margin-bottom:8px}
.pc-feat{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.pf{font-size:9px;font-weight:600;color:#555;background:#f2f2f2;padding:3px 6px;border-radius:5px}
.pc-price-row{display:flex;align-items:center;justify-content:space-between;background:#FEFCE8;border:1px solid rgba(250,204,21,.15);border-radius:7px;padding:6px 9px;margin-bottom:8px}
.pc-cfp{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:var(--or)}
.pc-stock{font-size:8px;font-weight:700;color:var(--rd);text-transform:uppercase;display:flex;align-items:center;gap:3px}
.pc-stock::before{content:'';width:5px;height:5px;background:var(--rd);border-radius:50%;display:inline-block;animation:blink 1s infinite}
.pc-acts{display:flex;gap:5px;margin-top:auto}
.pca-call{flex:1;background:var(--or);color:var(--dk);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12.5px;text-transform:uppercase;padding:8px 5px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.pca-call svg{width:12px;height:12px;fill:var(--dk)}
.pca-enq{background:var(--wh);color:var(--or);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;padding:8px 9px;border-radius:8px;border:2px solid var(--or);cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
.pca-enq svg{width:11px;height:11px;fill:var(--or)}

/* REVIEW CARDS */
.rv-card{background:var(--wh);border-radius:var(--r2);padding:17px;border:1px solid var(--bd);margin-bottom:11px}
.rv-stars{color:var(--or);font-size:14px;letter-spacing:2px;margin-bottom:8px}
.rv-txt{font-size:13px;line-height:1.65;color:#444;font-style:italic;margin-bottom:10px}
.rv-auth{font-weight:700;font-size:12.5px}
.rv-role{font-size:10.5px;color:var(--mu)}

/* ====================================================
   HERO
==================================================== */
.hero{background:var(--dk);padding:34px 15px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:450px;height:450px;background:radial-gradient(circle,rgba(250,204,21,.18) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-60px;left:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(250,204,21,.1) 0%,transparent 65%);pointer-events:none}
.hero-live{display:inline-flex;align-items:center;gap:7px;background:rgba(250,204,21,.15);border:1px solid rgba(250,204,21,.4);color:#FDE047;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:5px 12px;border-radius:100px;margin-bottom:16px}
.blink{width:7px;height:7px;background:var(--or);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hero h1{font-size:clamp(36px,9.5vw,72px);font-weight:900;color:#fff;margin-bottom:12px;line-height:.95}
.hero h1 .acc{color:var(--or)}
.hero-sub{color:#ddd6a8;font-size:14px;line-height:1.7;margin-bottom:24px;max-width:460px}
.hero-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.hero-img-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid rgba(250,204,21,.3);margin-top:24px}
.hero-img-wrap img{width:100%;aspect-ratio:16/9;object-fit:cover}
.hero-img-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,transparent 100%);padding:18px 14px 13px}
.hero-ov-badge{display:inline-flex;align-items:center;gap:5px;background:var(--or);color:var(--dk);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:5px 9px;border-radius:6px}

/* ====================================================
   HOME MINI PRODUCTS
==================================================== */
.hp-list{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.hp-card{background:var(--wh);border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--bd);display:flex;align-items:center;transition:box-shadow .2s}
.hp-card:hover{box-shadow:var(--sh2)}
.hp-card img{width:100px;height:100px;object-fit:cover;flex-shrink:0}
.hp-body{padding:12px;flex:1}
.hp-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--or);margin-bottom:3px}
.hp-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;line-height:1.05;margin-bottom:7px}
.hp-acts{display:flex;gap:6px}
.hp-call{flex:1;background:var(--or);color:var(--dk);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;padding:8px 8px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.hp-call svg{width:13px;height:13px;fill:var(--dk)}
.hp-enq{background:var(--wh);color:var(--or);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;padding:8px 9px;border-radius:7px;border:2px solid var(--or);cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
.view-all{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--wh);color:var(--or);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase;padding:13px 22px;border-radius:10px;border:2px solid var(--or);cursor:pointer;margin-top:18px;width:100%;transition:all .15s}
.view-all:active{background:var(--or);color:var(--dk)}

/* ====================================================
   PRODUCTS PAGE
==================================================== */
.prod-hdr{background:var(--dk);padding:32px 15px 28px;position:relative;overflow:hidden}
.prod-hdr::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(250,204,21,.15) 0%,transparent 70%);pointer-events:none}
.prod-hdr .lbl{color:rgba(250,204,21,.85)}
.prod-hdr .ttl{color:#fff;margin-bottom:6px}
.prod-hdr .sub{color:#c4c4c4}
.cat-bar{background:var(--wh);border-bottom:1px solid var(--bd);display:flex;gap:7px;padding:13px 14px 0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{font-family:'DM Sans',sans-serif;font-weight:700;font-size:12.5px;padding:7px 15px;border-radius:100px;border:1.5px solid var(--bd);background:var(--wh);color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;margin-bottom:11px}
.cat-pill.on,.cat-pill:active{background:var(--or);color:var(--dk);border-color:var(--or)}
.prod-cta{background:var(--dk);padding:26px 15px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:11px}
.prod-cta p{color:#c4c4c4;font-size:13px}
.prod-cta h3{color:#fff;font-size:24px;font-weight:900;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* ====================================================
   ABOUT PAGE
==================================================== */
.ab-hero{background:var(--dk);padding:34px 15px 38px;position:relative;overflow:hidden}
.ab-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:380px;height:380px;background:radial-gradient(circle,rgba(250,204,21,.15) 0%,transparent 65%);pointer-events:none}
.ab-hero .ttl{color:#fff;font-size:clamp(34px,9vw,60px)}
.ab-hero p{color:#d4d4d8;font-size:14px;line-height:1.7;margin-top:10px}
.ab-story{background:var(--wh);padding:36px 15px}
.ab-story h3{font-size:26px;font-weight:900;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.ab-story p{font-size:13.5px;line-height:1.8;color:#555;margin-bottom:12px}
.ab-story .hl{color:var(--or);font-weight:700}
.gst-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);color:var(--dk);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:5px 10px;border-radius:6px;margin-top:8px}
.tl-wrap{padding:32px 15px;background:var(--bg)}
.tl-item{display:flex;gap:14px;padding-bottom:24px;position:relative}
.tl-item::before{content:'';position:absolute;left:17px;top:38px;bottom:0;width:2px;background:var(--bd)}
.tl-item:last-child::before{display:none}
.tl-dot{width:36px;height:36px;background:var(--or);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:var(--dk);position:relative;z-index:1}
.tl-yr{font-size:10.5px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.tl-t{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;margin-bottom:3px}
.tl-d{font-size:12.5px;color:var(--mu);line-height:1.55}
.val-sec{background:var(--dk);padding:36px 15px}
.val-sec .lbl{color:rgba(250,204,21,.8)}
.val-sec .ttl{color:#fff;margin-bottom:20px}
.val-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.val-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:16px 13px}
.val-ico{width:38px;height:38px;background:rgba(250,204,21,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.val-ico svg{width:19px;height:19px;fill:var(--or)}
.val-t{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;color:#fff;margin-bottom:4px}
.val-d{font-size:11.5px;color:#d4d4d8;line-height:1.55}
.why-sec{background:var(--bg);padding:36px 15px}
.why-list{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.why-item{background:var(--wh);border-radius:11px;padding:14px;display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--bd)}
.why-n{width:34px;height:34px;background:var(--or);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:var(--dk);flex-shrink:0}
.why-tt{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;margin-bottom:2px}
.why-dd{font-size:12.5px;color:var(--mu);line-height:1.55}

/* ====================================================
   CONTACT PAGE
==================================================== */
.ct-hero{background:var(--dk);padding:34px 15px 38px;position:relative;overflow:hidden}
.ct-hero::before{content:'';position:absolute;top:-70px;right:-70px;width:350px;height:350px;background:radial-gradient(circle,rgba(250,204,21,.15) 0%,transparent 70%);pointer-events:none}
.ct-hero .ttl{color:#fff;font-size:clamp(32px,8.5vw,58px)}
.ct-hero p{color:#d4d4d8;font-size:13.5px;line-height:1.7;margin-top:9px}
.ct-opts{background:var(--wh);padding:26px 15px}
.ct-grid{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.ct-opt{display:flex;align-items:center;gap:13px;background:var(--bg);border-radius:12px;padding:14px;border:1.5px solid var(--bd);text-decoration:none;color:var(--tx);transition:all .15s}
.ct-opt:hover{border-color:var(--or);box-shadow:0 3px 14px rgba(250,204,21,.1)}
.ct-opt-ic{width:45px;height:45px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct-opt-ic svg{width:22px;height:22px}
.ct-opt-ic.or{background:rgba(250,204,21,.1)}.ct-opt-ic.or svg{fill:var(--or)}
.ct-opt-ic.gn{background:rgba(37,211,102,.1)}.ct-opt-ic.gn svg{fill:var(--gn)}
.ct-opt-ic.bl{background:rgba(59,130,246,.1)}.ct-opt-ic.bl svg{fill:#3b82f6}
.ct-opt-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase;margin-bottom:1px}
.ct-opt-d{font-size:12.5px;color:var(--mu)}
.ct-opt-arr{margin-left:auto;color:var(--mu);font-size:19px}
.biz-sec{background:var(--bg);padding:24px 15px}
.biz-card{background:var(--wh);border-radius:13px;padding:18px;border:1.5px solid var(--bd);margin-bottom:11px}
.biz-card-hdr{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--bd)}
.biz-ic{width:34px;height:34px;background:var(--or3);border-radius:8px;display:flex;align-items:center;justify-content:center}
.biz-ic svg{width:17px;height:17px;fill:var(--or)}
.biz-card-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase}
.biz-row{display:flex;gap:9px;margin-bottom:9px;align-items:flex-start}
.biz-row:last-child{margin-bottom:0}
.biz-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);min-width:60px;padding-top:1px}
