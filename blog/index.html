<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DJ Equipment Blog | Tips, Guides & Price Lists | Punishka Trading Delhi</title>
<meta name="description" content="DJ equipment guides, price lists, reviews and tips in Hindi & English. Amplifiers, mixers, speakers, cabinets, crossovers — expert advice from Punishka Trading, Rohini New Delhi."/>
<link rel="canonical" href="https://www.punishkatrading.com/blog/"/>
<meta name="robots" content="index, follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="DJ Equipment Blog | Punishka Trading Delhi"/>
<meta property="og:url" content="https://www.punishkatrading.com/blog/"/>
<meta property="og:image" content="/images/djamplifer/pu8000-4-channel-class-h-amplifier/front.jpg"/>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Blog",
  "name": "Punishka Trading DJ Equipment Blog",
  "url": "https://www.punishkatrading.com/blog/",
  "description": "Expert guides, price lists and tips for DJ equipment in India",
  "publisher": {
    "@type": "Organization",
    "name": "Punishka Trading",
    "url": "https://www.punishkatrading.com"
  }
}
</script>
<link rel="stylesheet" href="/css/shared.css"/>
<script src="/components/shared.js"></script>
<style>
:root{--or:#FF6B00;--bg:#f5f5f7;--wh:#fff;--tx:#1d1d1f;--mu:#6e6e73;--bd:#e5e5ea}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);padding-top:64px;padding-bottom:85px;overflow-x:hidden}
@media(min-width:768px){body{padding-bottom:0}}
a{text-decoration:none;color:inherit}
/* Hero */
.blog-hero{background:#1d1d1f;padding:48px 20px 52px;text-align:center;position:relative;overflow:hidden}
.blog-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(circle,rgba(255,107,0,.18) 0%,transparent 70%);pointer-events:none}
.blog-hero-lbl{display:inline-block;background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.4);color:#ff9944;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:5px 14px;border-radius:100px;margin-bottom:14px}
.blog-hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(32px,6vw,56px);color:#fff;text-transform:uppercase;letter-spacing:-.01em;line-height:1;margin-bottom:12px}
.blog-hero h1 span{color:var(--or)}
.blog-hero p{color:#9d9d9f;font-size:15px;max-width:500px;margin:0 auto}
/* Filters */
.blog-filters{background:#fff;border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.blog-filters::-webkit-scrollbar{display:none}
.bf{font-family:'DM Sans',sans-serif;font-weight:600;font-size:12.5px;padding:7px 16px;border-radius:100px;border:1.5px solid var(--bd);background:#fff;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .2s}
.bf.on,.bf:hover{background:var(--or);color:#fff;border-color:var(--or)}
/* Grid */
.blog-wrap{max-width:1200px;margin:0 auto;padding:40px 20px 60px}
.blog-grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:600px){.blog-grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.blog-grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.blog-grid{grid-template-columns:repeat(4,1fr)}}
/* Card */
.bc{background:#fff;border-radius:16px;overflow:hidden;border:1px solid rgba(0,0,0,.07);box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .22s;display:flex;flex-direction:column}
.bc:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.bc-img{width:100%;height:180px;object-fit:cover;background:#f0f0f0;display:block}
.bc-img-ph{width:100%;height:180px;background:linear-gradient(135deg,#1d1d1f 0%,#2c2c2e 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bc-img-ph svg{width:40px;height:40px;fill:rgba(255,107,0,.4)}
.bc-body{padding:16px;flex:1;display:flex;flex-direction:column}
.bc-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--or);margin-bottom:6px}
.bc-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;color:#1d1d1f;line-height:1.15;margin-bottom:8px}
.bc-excerpt{font-size:12.5px;color:var(--mu);line-height:1.6;margin-bottom:14px;flex:1}
.bc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.bc-date{font-size:11px;color:var(--mu)}
.bc-lang{display:flex;gap:4px}
.bc-lang span{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#f0f0f5;color:#555;text-transform:uppercase}
.bc-read{font-size:12px;font-weight:700;color:var(--or);display:flex;align-items:center;gap:4px;margin-top:12px}
/* Empty state */
.blog-empty{text-align:center;padding:80px 20px;color:var(--mu)}
.blog-empty svg{width:48px;height:48px;fill:var(--bd);margin:0 auto 16px}
.blog-empty h3{font-family:'Barlow Condensed',sans-serif;font-size:24px;text-transform:uppercase;margin-bottom:8px;color:#3a3a3c}
/* Section heading */
.blog-sec-hd{margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.blog-sec-hd h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;text-transform:uppercase;color:#1d1d1f}
.blog-count{font-size:13px;color:var(--mu)}
</style>
</head>
<body>

<div id="pt-header"></div>

<!-- HERO -->
<section class="blog-hero">
  <div class="blog-hero-lbl">📝 Knowledge Hub</div>
  <h1>DJ Equipment<br/><span>Blog & Guides</span></h1>
  <p>Expert tips, buying guides, price lists & reviews — Hindi & English. Updated daily.</p>
</section>

<!-- CATEGORY FILTERS -->
<div class="blog-filters">
  <button class="bf on" onclick="filterBlog('all')">All Posts</button>
  <button class="bf" onclick="filterBlog('amplifier')">Amplifiers</button>
  <button class="bf" onclick="filterBlog('mixer')">Mixers</button>
  <button class="bf" onclick="filterBlog('speaker')">Speakers</button>
  <button class="bf" onclick="filterBlog('microphone')">Microphones</button>
  <button class="bf" onclick="filterBlog('cabinet')">Cabinets</button>
  <button class="bf" onclick="filterBlog('crossover')">Crossovers</button>
  <button class="bf" onclick="filterBlog('subwoofer')">Subwoofers</button>
  <button class="bf" onclick="filterBlog('accessories')">Accessories</button>
</div>

<!-- BLOG GRID -->
<div class="blog-wrap">
  <div class="blog-sec-hd">
    <h2>Latest Posts</h2>
    <span class="blog-count" id="blog-count">Loading...</span>
  </div>
  <div class="blog-grid" id="blog-grid">
    <div class="blog-empty">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <h3>Posts Loading...</h3>
      <p>Daily blog posts will appear here automatically</p>
    </div>
  </div>
</div>

<div id="pt-footer"></div>

<script>
// Blog posts data — auto-populated by daily scheduled task
var BLOG_POSTS = [];

// Try loading posts from data file
fetch('/blog/posts.json')
  .then(r => r.ok ? r.json() : [])
  .then(posts => {
    BLOG_POSTS = posts;
    renderBlog('all');
  })
  .catch(() => {
    document.getElementById('blog-grid').innerHTML = '<div class="blog-empty"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><h3>Coming Soon</h3><p>Daily posts start appearing from tomorrow!</p></div>';
    document.getElementById('blog-count').textContent = '0 posts';
  });

function filterBlog(cat) {
  document.querySelectorAll('.bf').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  renderBlog(cat);
}

function renderBlog(cat) {
  var posts = cat === 'all' ? BLOG_POSTS : BLOG_POSTS.filter(p => p.category === cat);
  document.getElementById('blog-count').textContent = posts.length + ' post' + (posts.length !== 1 ? 's' : '');
  if (!posts.length) {
    document.getElementById('blog-grid').innerHTML = '<div class="blog-empty"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><h3>No Posts Yet</h3><p>Check back soon!</p></div>';
    return;
  }
  document.getElementById('blog-grid').innerHTML = posts.map(p => `
    <a href="/blog/${p.slug}/" class="bc">
      <div class="bc-img-ph">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </div>
      <div class="bc-body">
        <div class="bc-cat">${p.category}</div>
        <div class="bc-title">${p.title}</div>
        <div class="bc-excerpt">${p.excerpt}</div>
        <div class="bc-meta">
          <span class="bc-date">${p.date}</span>
          <div class="bc-lang"><span>EN</span><span>HI</span></div>
        </div>
        <div class="bc-read">Read More →</div>
      </div>
    </a>`).join('');
}
</script>
</body>
</html>
